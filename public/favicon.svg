<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background Solid Circle in #FF7A00 (Theme Orange color) -->
  <circle cx="256" cy="256" r="256" fill="#FF7A00" />
  
  <!-- Outer Stylized Soccer Ball Border -->
  <circle cx="256" cy="256" r="185" fill="none" stroke="#FFFFFF" stroke-width="14" />
  
  <!-- Soccer Ball Pentagons & Panels in #FFFFFF (White) -->
  <!-- Center Pentagon -->
  <polygon points="256,192 317,236 294,307 218,307 195,236" fill="#FFFFFF" />
  
  <!-- Top Panel Connection -->
  <line x1="256" y1="192" x2="256" y2="120" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" />
  <!-- Top Left Connection -->
  <line x1="195" y1="236" x2="135" y2="195" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" />
  <!-- Top Right Connection -->
  <line x1="317" y1="236" x2="377" y2="195" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" />
  <!-- Bottom Left Connection -->
  <line x1="218" y1="307" x2="180" y2="370" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" />
  <!-- Bottom Right Connection -->
  <line x1="294" y1="307" x2="332" y2="370" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" />

  <!-- Outer panels/arcs connecting to the border -->
  <!-- Top arc/cap -->
  <path d="M 200,120 A 70,70 0 0,1 312,120" fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" />
  <path d="M 256,120 L 256,71" stroke="#FFFFFF" stroke-width="14" />
  
  <!-- Bottom arcs -->
  <path d="M 120,250 A 65,65 0 0,0 180,370" fill="none" stroke="#FFFFFF" stroke-width="14" />
  <path d="M 392,250 A 65,65 0 0,1 332,370" fill="none" stroke="#FFFFFF" stroke-width="14" />
  <path d="M 180,370 A 90,90 0 0,0 332,370" fill="none" stroke="#FFFFFF" stroke-width="14" />
</svg>